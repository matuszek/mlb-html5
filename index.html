<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MLB Scoreboard</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0 auto;
      padding: 4px;
      max-width: 100%;
      background-color: #5b8962;
    }
    h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; }
    .date-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }
    .date-row label { font-size: 0.5rem; }
    .date-row input[type="date"],
    .date-row input[type="password"],
    .date-row input[type="text"] {
      padding: 0.35rem 0.3rem;
      font-size: 0.5rem;
    }
    #api-key { min-width: 16em; }
    .date-row button {
      padding: 0.3rem 0.3rem;
      font-size: 0.4rem;
      cursor: pointer;
    }
    #out {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 4px;
    }
    .game {
      padding: 2px 3px;
      background: #fafafa;
      border-radius: 3px;
      flex: 0 0 var(--game-width, 90px);
      width: var(--game-width, 90px);
      min-width: 0;
      overflow: hidden;
      container-type: inline-size;
      display: flex;
      align-items: center;
    }
    .game-teams {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 4px;
      line-height: 1.2;
      min-width: 0;
    }
    .team {
      font-size: 0.8rem;
      display: inline-flex;
      align-items: center;
      gap: 3px;
      min-width: 0;
      overflow: visible;
    }
    .team-name {
      font-size: 0.75rem;
      margin-left: 0.1em;
    }
    .team-name.short { display: none; }
    #out.abbrev .team-name.long { display: none; }
    #out.abbrev .team-name.short { display: inline; }
    .team-name.winner { font-weight: bold; }
    @container (max-width: 130px) { .team { font-size: 0.65rem; } .team-name { font-size: 0.65rem; } }
    @container (max-width: 100px) { .team { font-size: 0.55rem; } .team-name { font-size: 0.55rem; } }
    .team img {
      height: 1em;
      width: auto;
      flex-shrink: 0;
      vertical-align: middle;
      position: relative;
      z-index: 1;
    }
    .team.away img {
      transform: scale(1.5) translateY(-0.05em);
      transform-origin: center center;
    }
    .team.home img {
      transform: scale(1.5) translateY(0.05em);
      transform-origin: center center;
    }
    .score { font-size: 0.8rem; font-weight: 600; min-width: 1.5ch; text-align: right; }
    .status {
      font-size: 0.75rem;
      flex-shrink: 0;
      margin-left: 5px;
    }
    .status-time {
      color: #a5a5a5;
      font-weight: 500;
      font-size: 0.55rem;
    }
    .status-state {
      color: #a5a5a5;
    }
    .loading { font-size: 0.9rem; margin-top: 0.5rem; }
    .error {
      font-size: 1rem;
      margin-top: 0.5rem;
      padding: 0.5rem 0.75rem;
      border: 1px solid #c00;
      background: #fff5f5;
      color: #c00;
      border-radius: 4px;
    }
    .empty { color: #666; font-style: italic; }
    body.inputs-hidden > .date-row { display: none; }
    body.inputs-hidden { padding-bottom: 0; }
    .cache-updated {
      position: fixed;
      bottom: 8px;
      right: 8px;
      font-size: 0.2rem;
      color: #a7bd43;
      pointer-events: none;
      display: none;
    }
    .cache-updated.visible { display: block; }
  </style>
</head>
<body>
  <div id="out"></div>
  <div id="cache-updated" class="cache-updated" aria-live="polite"></div>
  <div class="date-row">
    <label for="date">Date</label>
    <input type="date" id="date" />
    <button type="button" id="go">Go</button>
    <button type="button" id="today">Today</button>
  </div>
  <div class="date-row">
    <label for="api-key">API key</label>
    <input type="password" id="api-key" placeholder="BallDontLie.io key" autocomplete="off" />
  </div>

  <script>
    (function () {
      const BASE = 'https://api.balldontlie.io';
      const STORAGE_KEY = 'mlb-api-key';
      const DATE_STORAGE_KEY = 'mlb-date';
      const GAMES_CACHE_KEY = 'mlb-games-cache';
      const GAP = 4;
      const MIN_BOX_FULL = 90;
      const MIN_BOX_ABBREV = 58;
      const SHOW_SCORE_STATUSES = ['STATUS_FINAL', 'STATUS_IN_PROGRESS', 'STATUS_SUSPENDED', 'STATUS_DELAYED'];

      var gamesCache = {};
      try {
        var stored = localStorage.getItem(GAMES_CACHE_KEY);
        if (stored) gamesCache = JSON.parse(stored);
      } catch (e) {}

      function saveGamesCache() {
        try { localStorage.setItem(GAMES_CACHE_KEY, JSON.stringify(gamesCache)); } catch (e) {}
      }

      function todayET() {
        return new Date().toLocaleDateString('en-CA', { timeZone: 'America/New_York' });
      }

      function getCacheExpiry(dateStr) {
        var todayStr = todayET();
        if (dateStr === todayStr) return Date.now() + 10 * 60 * 1000;
        if (dateStr < todayStr) return null;
        var parts = dateStr.split('-').map(Number);
        return Date.UTC(parts[0], parts[1] - 1, parts[2], 8, 0, 0);
      }

      var cacheUpdatedEl = null;
      function formatCacheTime(ts) {
        var d = new Date(ts);
        var h = d.getHours();
        var m = d.getMinutes();
        var s = d.getSeconds();
        var ampm = h < 12 ? 'am' : 'pm';
        h = h % 12 || 12;
        return h + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0') + ' ' + ampm;
      }
      function showCacheUpdated(cachedAt) {
        if (!cacheUpdatedEl) cacheUpdatedEl = document.getElementById('cache-updated');
        if (!cacheUpdatedEl) return;
        cacheUpdatedEl.textContent = 'Last updated at: ' + formatCacheTime(cachedAt);
        cacheUpdatedEl.classList.add('visible');
      }
      function hideCacheUpdated() {
        if (!cacheUpdatedEl) cacheUpdatedEl = document.getElementById('cache-updated');
        if (cacheUpdatedEl) cacheUpdatedEl.classList.remove('visible');
      }

      const dateEl = document.getElementById('date');
      const goBtn = document.getElementById('go');
      const todayBtn = document.getElementById('today');
      const outEl = document.getElementById('out');
      const apiKeyEl = document.getElementById('api-key');

      try {
        var saved = localStorage.getItem(STORAGE_KEY);
        if (saved) apiKeyEl.value = saved;
      } catch (e) {}
      apiKeyEl.addEventListener('input', function () {
        try { localStorage.setItem(STORAGE_KEY, apiKeyEl.value); } catch (e) {}
      });

      function today() {
        var d = new Date();
        return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
      }
      try {
        var savedDate = localStorage.getItem(DATE_STORAGE_KEY);
        dateEl.value = savedDate || today();
      } catch (e) {
        dateEl.value = today();
      }
      function saveDate() {
        try { localStorage.setItem(DATE_STORAGE_KEY, dateEl.value); } catch (e) {}
      }

      // Team name → logo ID (MLB CDN). Used for logo lookup only.
      var TEAM_NAME_TO_LOGO_ID = {
        'orioles': 110, 'baltimore orioles': 110, 'baltimore': 110,
        'red sox': 111, 'boston red sox': 111, 'boston': 111,
        'yankees': 147, 'new york yankees': 147, 'ny yankees': 147,
        'rays': 139, 'tampa bay rays': 139, 'tampa bay': 139,
        'blue jays': 141, 'toronto blue jays': 141, 'toronto': 141,
        'white sox': 145, 'chicago white sox': 145, 'chi white sox': 145,
        'guardians': 114, 'cleveland guardians': 114, 'cleveland': 114,
        'tigers': 116, 'detroit tigers': 116, 'detroit': 116,
        'royals': 118, 'kansas city royals': 118, 'kansas city': 118,
        'twins': 142, 'minnesota twins': 142, 'minnesota': 142,
        'athletics': 133, 'oakland athletics': 133, 'oakland': 133,
        'astros': 117, 'houston astros': 117, 'houston': 117,
        'angels': 108, 'los angeles angels': 108, 'la angels': 108,
        'mariners': 136, 'seattle mariners': 136, 'seattle': 136,
        'rangers': 140, 'texas rangers': 140, 'texas': 140,
        'braves': 144, 'atlanta braves': 144, 'atlanta': 144,
        'marlins': 146, 'miami marlins': 146, 'miami': 146,
        'mets': 121, 'new york mets': 121, 'ny mets': 121,
        'phillies': 143, 'philadelphia phillies': 143, 'philadelphia': 143,
        'nationals': 120, 'washington nationals': 120, 'washington': 120,
        'cubs': 112, 'chicago cubs': 112, 'chi cubs': 112,
        'reds': 113, 'cincinnati reds': 113, 'cincinnati': 113,
        'brewers': 158, 'milwaukee brewers': 158, 'milwaukee': 158,
        'pirates': 134, 'pittsburgh pirates': 134, 'pittsburgh': 134,
        'cardinals': 138, 'st. louis cardinals': 138, 'st louis cardinals': 138, 'st. louis': 138, 'st louis': 138,
        'diamondbacks': 109, 'arizona diamondbacks': 109, 'arizona': 109, 'd-backs': 109, 'd\'backs': 109, 'dbacks': 109,
        'rockies': 115, 'colorado rockies': 115, 'colorado': 115,
        'dodgers': 119, 'los angeles dodgers': 119, 'la dodgers': 119,
        'padres': 135, 'san diego padres': 135, 'san diego': 135,
        'giants': 137, 'san francisco giants': 137, 'san francisco': 137
      };
      function teamNameToLogoUrl(name) {
        if (!name || typeof name !== 'string') return '';
        var id = TEAM_NAME_TO_LOGO_ID[(name.trim().toLowerCase())];
        return id ? id + '.svg' : '';
      }

      function teamName(team) {
        if (!team) return '—';
        if (team.short_display_name === 'Braves') return 'Atlanta';
        if (team.short_display_name === 'Diamondbacks') return 'D\'backs';
        return team.short_display_name || team.display_name || team.name || '—';
      }

      function teamNameForDisplay(name) {
        var i = (name || '').lastIndexOf(' ');
        return i >= 0 ? name.slice(0, i) + '\u00A0' + name.slice(i + 1) : (name || '—');
      }

      function teamAbbrev(team) {
        return (team && team.abbreviation) ? team.abbreviation : (team ? teamName(team) : '—');
      }

      function formatScore(runs) {
        return runs === 1 ? '1\u2009' : runs;
      }

      function teamLogo(team) {
        if (!team) return '';
        var url = teamNameToLogoUrl(teamName(team));
        return url ? '<img src="' + url + '" alt="" />' : '';
      }

      function parseScheduledTime(dateStr) {
        if (!dateStr) return '';
        var t = dateStr.split('T')[1];
        if (!t) return '';
        var parts = t.split(':');
        if (!parts[0] || !parts[1]) return '';
        var hour12 = parseInt(parts[0], 10) % 12;
        return (hour12 || 12) + ':' + parts[1];
      }

      function statusText(game) {
        if (!game.status) return '';
        switch (game.status) {
          case 'STATUS_FINAL': return 'F';
          case 'STATUS_IN_PROGRESS': return game.period;
          case 'STATUS_SCHEDULED': return parseScheduledTime(game.date);
          case 'STATUS_NOT_STARTED': return 'Not Started';
          case 'STATUS_SUSPENDED': return 'Suspended';
          case 'STATUS_DELAYED': return 'Delayed';
          case 'STATUS_POSTPONED': return 'Postponed';
          case 'STATUS_CANCELLED': return 'Cancelled';
          case 'STATUS_UNKNOWN': return 'Unknown';
          default: return game.status;
        }
      }

      function updateGameWidth() {
        var games = outEl.querySelectorAll('.game');
        if (games.length === 0) return;
        var w = outEl.clientWidth;
        var colsFull = Math.max(1, Math.floor((w + GAP) / (MIN_BOX_FULL + GAP)));
        var colsAbbrev = Math.max(1, Math.floor((w + GAP) / (MIN_BOX_ABBREV + GAP)));
        var boxWidthFull = (w - (colsFull - 1) * GAP) / colsFull;
        outEl.style.setProperty('--game-width', boxWidthFull + 'px');
        outEl.classList.remove('abbrev');
        var last = games[games.length - 1];
        var overflows = last && last.getBoundingClientRect().bottom > window.innerHeight;
        var abbrevWouldHelp = colsAbbrev > colsFull;
        if (overflows && abbrevWouldHelp) {
          var boxWidthAbbrev = (w - (colsAbbrev - 1) * GAP) / colsAbbrev;
          outEl.style.setProperty('--game-width', boxWidthAbbrev + 'px');
          outEl.classList.add('abbrev');
        }
      }

      function isTeamInGame(g, name, abbr) {
        function hasTeam(t) {
          return t && (t.name === name || t.abbreviation === abbr || (t.short_display_name && t.short_display_name.indexOf(name) >= 0));
        }
        return hasTeam(g.away_team) || hasTeam(g.home_team);
      }

      function gameOrderTier(g) {
        if (isTeamInGame(g, 'Phillies', 'PHI')) return 0;
        if (isTeamInGame(g, 'Orioles', 'BAL')) return 1;
        return 2;
      }

      function render(games) {
        if (!games || games.length === 0) {
          outEl.innerHTML = '<p class="empty">No games on this date.</p>';
          return;
        }
        games = games.slice().sort(function (a, b) {
          return gameOrderTier(a) - gameOrderTier(b);
        });
        outEl.innerHTML = games.map(function (g) {
          var away = g.away_team;
          var home = g.home_team;
          var awayRuns = (g.away_team_data && g.away_team_data.runs != null) ? g.away_team_data.runs : '–';
          var homeRuns = (g.home_team_data && g.home_team_data.runs != null) ? g.home_team_data.runs : '–';
          var showScores = SHOW_SCORE_STATUSES.indexOf(g.status) >= 0;
          var isFinal = g.status === 'STATUS_FINAL';
          var awayNum = typeof awayRuns === 'number' ? awayRuns : null;
          var homeNum = typeof homeRuns === 'number' ? homeRuns : null;
          var awayWins = isFinal && awayNum != null && homeNum != null && awayNum > homeNum;
          var homeWins = isFinal && awayNum != null && homeNum != null && homeNum > awayNum;
          var awayNameClass = 'team-name' + (awayWins ? ' winner' : '');
          var homeNameClass = 'team-name' + (homeWins ? ' winner' : '');
          var awayScoreHtml = showScores ? '<span class="score">' + formatScore(awayRuns) + '</span>' : '';
          var homeScoreHtml = showScores ? '<span class="score">' + formatScore(homeRuns) + '</span>' : '';
          return (
            '<div class="game">' +
              '<div class="game-teams">' +
                '<div class="row"><span class="team away">' + teamLogo(away) + '<span class="' + awayNameClass + ' long">' + teamNameForDisplay(teamName(away)) + '</span><span class="' + awayNameClass + ' short">' + teamAbbrev(away) + '</span></span>' + awayScoreHtml + '</div>' +
                '<div class="row"><span class="team home">' + teamLogo(home) + '<span class="' + homeNameClass + ' long">' + teamNameForDisplay(teamName(home)) + '</span><span class="' + homeNameClass + ' short">' + teamAbbrev(home) + '</span></span>' + homeScoreHtml + '</div>' +
              '</div>' +
              '<div class="status ' + (g.status === 'STATUS_SCHEDULED' ? 'status-time' : 'status-state') + '">' + statusText(g) + '</div>' +
            '</div>'
          );
        }).join('');
        updateGameWidth();
      }

      function load(date) {
        var entry = gamesCache[date];
        if (entry && (entry.expiresAt === null || Date.now() < entry.expiresAt)) {
          render(entry.data);
          if (entry.cachedAt != null) showCacheUpdated(entry.cachedAt);
          return;
        }

        hideCacheUpdated();
        outEl.innerHTML = '<p class="loading">Loading…</p>';

        var url = BASE + '/mlb/v1/games?dates[]=' + encodeURIComponent(date) + '&per_page=50';
        fetch(url, {
          headers: { 'Authorization': apiKeyEl.value.trim() }
        })
          .then(function (r) {
            if (!r.ok) {
              var e = new Error('API error: ' + r.status + ' ' + r.statusText);
              e.status = r.status;
              throw e;
            }
            return r.json();
          })
          .then(function (json) {
            var data = Array.isArray(json.data) ? json.data : [];
            var cachedAt = Date.now();
            gamesCache[date] = { data: data, expiresAt: getCacheExpiry(date), cachedAt: cachedAt };
            saveGamesCache();
            render(data);
            showCacheUpdated(cachedAt);
          })
          .catch(function (err) {
            if (err.status !== 429) {
              delete gamesCache[date];
              saveGamesCache();
            }
            var msg = err.status === 429
              ? 'Oops, rate limit exceeded. I\'m calling a free API for these scores lol.\n\nPlease wait a full MINUTE (sixty seconds) and try again.'
              : (err.message || 'Failed to load games.');
            outEl.innerHTML = '<p class="error">' + msg + '</p>';
          });
      }

      goBtn.addEventListener('click', function () { load(dateEl.value || today()); });
      todayBtn.addEventListener('click', function () {
        dateEl.value = today();
        saveDate();
        load(dateEl.value);
      });
      dateEl.addEventListener('change', saveDate);
      dateEl.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') load(dateEl.value || today());
      });
      window.addEventListener('resize', updateGameWidth);
      document.addEventListener('keydown', function (e) {
        if (e.key === 'h' || e.key === 'H') {
          document.body.classList.toggle('inputs-hidden');
        }
      });
      load(dateEl.value || today());
    })();
  </script>
</body>
</html>
